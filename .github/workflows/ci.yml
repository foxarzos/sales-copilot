name: CI/CD SalesCopilot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Stáhnout kód z GitHubu
        uses: actions/checkout@v4

      - name: Nastavit Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Nainstalovat knihovny
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Spustit testy přes Pytest
        env:
          FLASK_SECRET_KEY: "testovaci_klic"
        run: |
          pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Nasazení na Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"