<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>SalesCopilot - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== BACKGROUND ANIMATION ===== */
body {
    background: linear-gradient(-45deg, #F8FAFC, #E0F2FE, #DCFCE7, #F1F5F9);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    height: 100vh;
    font-family: Arial, sans-serif;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ===== LOGIN CARD ===== */
.login-card {
    border: 1px solid #E2E8F0;
    border-radius: 16px;
    padding: 32px;
    background: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

/* ===== BRAND ===== */
.brand {
    font-weight: 700;
    color: #0F172A;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

/* ===== BUTTON ===== */
.btn-primary {
    background: #2563EB;
    border: none;
}

.btn-primary:hover {
    background: #1D4ED8;
}

/* ===== SMALL TEXT ===== */
.small-text {
    color: #94A3B8;
    font-size: 12px;
}

</style>

</head>

<body class="d-flex align-items-center justify-content-center">

<div class="login-card" style="width: 380px;">

    <!-- LOGO -->
    <div class="brand">

        <svg width="34" height="34" viewBox="0 0 60 60">
            <circle cx="20" cy="30" r="8" stroke="#38BDF8" stroke-width="3" fill="none"/>
            <circle cx="40" cy="30" r="8" stroke="#22C55E" stroke-width="3" fill="none"/>
            <line x1="28" y1="30" x2="32" y2="30" stroke="#2563EB" stroke-width="3"/>
        </svg>

        SalesCopilot

    </div>

    <h4 class="text-center mb-4 fw-bold">Přihlášení</h4>

    <form method="POST">

        {% if error %}
            <div class="alert alert-danger text-center">
                 {{ error }}
            </div>
        {% endif %}

        <div class="mb-3">
            <label class="form-label"></label>
            <input type="text" name="username" class="form-control" placeholder="Uživatelské jméno">
        </div>

        <div class="mb-3">
            <label class="form-label"></label>
            <input type="password" name="password" class="form-control" placeholder="Heslo">
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">
            Přihlásit se
        </button>

    </form>

    <div class="text-center mt-3 small-text">
        AI Sales Assistant
    </div>

</div>

</body>
</html>
