<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesCopilot - Přihlášení</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #2563EB;
            --primary-hover: #1D4ED8;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --bg-glow: rgba(37, 99, 235, 0.04);
        }

        body {
            background-color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        body::before, body::after {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--bg-glow) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
        }
        body::before { top: -10%; left: -10%; }
        body::after { bottom: -10%; right: -10%; }

        /* Login Container */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 20px;
            padding: 40px;
            background: white;
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.05);
        }

        /* Branding */
        .brand {
            font-weight: 700;
            font-size: 22px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        /* Formulářové prvky */
        .form-floating > .form-control:focus ~ label::after {
            background-color: transparent !important;
        }

        .form-control {
            border: 1px solid #CBD5E1;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
            color: var(--text-main);
        }

        .form-floating > label {
            padding: 12px 16px;
            color: var(--text-muted);
        }

        /* Tlačítka */
        .btn-primary {
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Sociální přihlášení (SSO) */
        .btn-sso {
            border: 1px solid #E2E8F0;
            background: white;
            color: var(--text-main);
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .btn-sso:hover {
            background: #F8FAFC;
            border-color: #CBD5E1;
        }

        /* Oddělovač */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            margin: 24px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #E2E8F0;
        }

        .divider:not(:empty)::before { margin-right: .75em; }
        .divider:not(:empty)::after { margin-left: .75em; }

        /* Odkazy a drobnosti */
        .form-check-label, .forgot-link {
            font-size: 14px;
            color: var(--text-muted);
        }

        .forgot-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .badge-ai {
            background: #DBEAFE;
            color: #1D4ED8;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: inline-block;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="login-wrapper">

    <div class="login-card">

        <div class="brand mb-4">
            <svg width="36" height="36" viewBox="0 0 60 60">
                <circle cx="20" cy="30" r="8" stroke="#38BDF8" stroke-width="3.5" fill="none"/>
                <circle cx="40" cy="30" r="8" stroke="#22C55E" stroke-width="3.5" fill="none"/>
                <line x1="28" y1="30" x2="32" y2="30" stroke="#2563EB" stroke-width="3.5" stroke-linecap="round"/>
            </svg>
            SalesCopilot
        </div>

        <div class="text-center mb-4">
            <h4 class="fw-bold text-dark m-0">Přihlášení</h4>
            <p class="text-muted small mt-1">Zadejte své údaje pro přístup do aplikace</p>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"> <input type="hidden" name="won" value="false">

            {% if error %}
                <div class="alert alert-danger d-flex align-items-center gap-2 py-2.5 px-3 border-0 rounded-3 small mb-4" role="alert">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <div>{{ error }}</div>
                </div>
            {% endif %}

            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control" id="userInput" placeholder="Uživatelské jméno" required autocomplete="username">
                <label for="userInput"><i class="bi bi-person me-2"></i>Uživatelské jméno</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" name="password" class="form-control" id="passwordInput" placeholder="Heslo" required autocomplete="current-password">
                <label for="passwordInput"><i class="bi bi-lock me-2"></i>Heslo</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2.5 mb-2 shadow-sm">
                Přihlásit se <i class="bi bi-arrow-right ms-1"></i>
            </button>

        </form>

    </div>

    <div class="text-center mt-4">
        <span class="badge-ai">
            <i class="bi bi-stars me-1"></i> AI Sales Assistant
        </span>
        <p class="text-muted small mt-3">© 2026 SalesCopilot</p>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
